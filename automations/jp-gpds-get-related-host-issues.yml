commonfields:
  id: jp-gpds-get-related-host-issues
  version: 10
vcShouldKeepItemLegacyProdMachine: false
name: jp-gpds-get-related-host-issues
script: |+
  SEVERITY_MAP = {
      0.5: 'Informational',
      1: 'Low',
      2: 'Medium',
      3: 'High',
      4: 'Critical',
  }

  TARGET_HEADERS = ['created', 'id', 'severity', 'parentXDRIncident', 'name', 'resolution_status', 'agentid']
  MAX_DISPLAY = 25


  agentid = demisto.alert().get('CustomFields', {}).get('agentid')
  if agentid:
      # search for target hosts
      command_args = {
          'query': f'agentid:"{agentid}"'
      }
      r = execute_command("getAlerts", command_args)
      data = r.get('data')

      if data:
          results = []
          for alert in data:
              fields = dict(alert, **alert.get('CustomFields', {}))
              row = {}
              for key in TARGET_HEADERS:
                  if key in fields:
                      value = fields[key]
                      row[key] = SEVERITY_MAP.get(value, value) if key == 'severity' else value
              results.append(row)

          if len(results) > MAX_DISPLAY:
              total = len(results)
              results = results[:MAX_DISPLAY]
              title = f'Issues Impacting {agentid} (Limited to {MAX_DISPLAY}, {total - MAX_DISPLAY} Hidden)'
          else:
              title = f'Issues Impacting {agentid}'
          md = tableToMarkdown(name=title, t=results, headers=TARGET_HEADERS)

      else: md = f'### No Related Issues Found for agentid: {agentid}'

  else: md = '### No Impacted Host Found'

  return_results(CommandResults(readable_output=md))



